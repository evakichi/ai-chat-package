services:
  ai-chat-package-open-webui:
    hostname: ai-chat-package-open-webui
    container_name: ai-chat-package-open-webui
    build:
      context: .
      dockerfile: Dockerfile.open-webui
    ports:
      - 8862:8080
    environment:
      - TZ=${TZ}
      - CHROMA_HTTP_HOST=ai-chat-package-chromadb
      - CHROMA_HTTP_PORT=8000
      - CHROMA_HTTP_SSL=false
      - WEB_SEARCH_TRUST_ENV=true
      - OLLAMA_BASE_URL=http://${DOMAIN_NAME}:11434
      - WEB_SEARCH_ENGINE=searxng
      - SEARXNG_QUERY_URL=http://ai-chat-package-searxng-nginx:8080/search?lang=ja&q=<query>&format=json
      - SEARXNG_LANGUAGE=ja
      - DEFAULT_USER_ROLE=user
      - WEBUI_URL=http://${DOMAIN_NAME}:8862
#      - OAUTH_CLIENT_ID=OpenWebUI
#      - OAUTH_CLIENT_SECRET=${KEYCLOAK_CLIENT_SECRET}
#      - OAUTH_SCOPES=openid
#      - OPENID_PROVIDER_URL=https://${KEYCLOAK_SERVER}/realms/OpenWebUI/.well-known/openid-configuration
#      - OAUTH_PROVIDER_NAME=keycloak
#      - OPENID_REDIRECT_URI=http://${DOMAIN_NAME}:8862/oauth/oidc/callback
#      - ENABLE_OAUTH_SIGNUP=true
    volumes:
      - ./open-webui-data/:/app/backend/data
    ## IF you can use GPU please remove following comment out
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
  ai-chat-package-searxng:
    hostname: ai-chat-package-searxng
    container_name: ai-chat-package-searxng
    image: searxng/searxng:latest
    environment:
      - TZ=${TZ}
      - SEARXNG_SETTINGS_PATH=/etc/searxng/settings.yml
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/var/cache/searxng/
    restart: unless-stopped
#  ai-chat-package-searxng-nginx:
#    image: nginx:stable-perl
#    container_name: ai-chat-package-searxng-nginx
#    hostname: ai-chat-package-searxng-nginx
#    environment:
#      - TZ=${TZ}
#    volumes:
#      - ./conf/nginx.conf:/etc/nginx/nginx.conf
#      - ./certs/${DOMAIN_NAME}.crt:/opt/certs/${DOMAIN_NAME}.crt:ro
#      - ./certs/${DOMAIN_NAME}.key:/opt/certs/${DOMAIN_NAME}.key:ro
#    ports:
#      - 8000:8000
#    restart: unless-stopped
  ai-chat-package-chromadb:
    hostname: ai-chat-package-chromadb
    container_name: ai-chat-package-chromadb
    image: chromadb/chroma:1.4.2.dev43
    environment:
      - TZ=${TZ}
    volumes:
      - ./chroma-data/:/data/
    restart: unless-stopped
  ai-chat-package-fastmcp:
    hostname: ai-chat-package-fastmcp
    container_name: ai-chat-package-fastmcp
    build:
      context: ./
      dockerfile: Dockerfile.fastmcp
    ports:
      - 8000:8000
    volumes:
      - ./fastmcp.py:/root/fastmcp-server.py:ro
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
    tty: true
    restart: unless-stopped
volumes:
  searxng-data:
  ollama-data:
